# MkDocs Material configuration for AI Engineering Playbook
# Site: https://abdulsamad183.github.io/ai-engineering-playbook/

site_name: AI Engineering Playbook
site_description: Production-oriented handbook for building, deploying, and operating modern AI applications
site_author: abdulsamad183
site_url: https://abdulsamad183.github.io/ai-engineering-playbook/

repo_name: abdulsamad183/ai-engineering-playbook
repo_url: https://github.com/abdulsamad183/ai-engineering-playbook
edit_uri: ""

docs_dir: docs
site_dir: site

# Symlinked tree mirrors the repo; skip code and non-doc artifacts
exclude_docs: |
  **/__pycache__/**
  **/.venv/**
  **/*.py
  **/*.pyc
  **/*.toml
  **/*.yml
  **/*.yaml
  **/*.json
  **/*.conf
  **/*.mmd
  **/Dockerfile*
  **/.env*
  **/.gitignore
  templates/engineering/**/src/**
  templates/engineering/**/tests/**
  templates/engineering/**/.github/**
  examples/**/*.py
  assets/slides/**
  assets/screenshots/**

theme:
  name: material
  custom_dir: overrides
  language: en
  features:
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.sections
    - navigation.path
    - navigation.top
    - navigation.indexes
    - navigation.footer
    - search.suggest
    - search.highlight
    - content.code.copy
    - toc.follow
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: teal
      accent: deep orange
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: teal
      accent: deep orange
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode
  font:
    text: Source Sans 3
    code: JetBrains Mono
  icon:
    repo: fontawesome/brands/github
    edit: material/pencil
    view: material/eye

plugins:
  - search:
      lang: en
  - minify:
      minify_html: true

hooks:
  - hooks/strip_frontmatter.py

markdown_extensions:
  - abbr
  - admonition
  - attr_list
  - def_list
  - footnotes
  - md_in_html
  - tables
  - toc:
      permalink: true
      toc_depth: 3
  - pymdownx.arithmatex:
      generic: true
  - pymdownx.betterem
  - pymdownx.caret
  - pymdownx.details
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.keys
  - pymdownx.mark
  - pymdownx.smartsymbols
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.tasklist:
      custom_checkbox: true
  - pymdownx.tilde

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/abdulsamad183/ai-engineering-playbook
  generator: false

extra_css:
  - stylesheets/extra.css

extra_javascript:
  - https://unpkg.com/mermaid@10/dist/mermaid.min.js
  - javascripts/mermaid-init.js

# Curated navigation — few tabs, capability-grouped handbooks
nav:
  - Home: index.md
  - Learn:
    - Learning Roadmap: meta/roadmap.md
    - Capstone Walkthrough: meta/capstone-walkthrough.md
  - Handbooks:
    - Foundations:
      - Overview: domains/foundations/README.md
      - Python: domains/python-engineering/README.md
      - Backend: domains/backend-engineering/README.md
      - APIs: domains/apis/README.md
      - FastAPI: domains/fastapi/README.md
      - Databases: domains/databases/README.md
    - Core:
      - LLM Engineering: domains/llm-engineering/README.md
      - Prompt Engineering: domains/prompt-engineering/README.md
      - Context Engineering: domains/context-engineering/README.md
    - Retrieval & Agents:
      - RAG: domains/rag/README.md
      - AI Agents: domains/ai-agents/README.md
      - MCP: domains/mcp/README.md
    - Production:
      - AI Evaluation: domains/ai-evaluation/README.md
      - System Design: domains/ai-system-design/README.md
      - Production AI: domains/ai-deployment/README.md
    - Craft & Growth:
      - AI Safety: domains/ai-safety/README.md
      - Debugging: domains/debugging/README.md
      - Common Mistakes: domains/common-mistakes/README.md
      - Research Papers: domains/papers/README.md
      - Interview Prep: domains/interview-preparation/README.md
  - Build:
    - Templates: templates/README.md
    - Starters: templates/engineering/README.md
    - Examples: examples/README.md
    - Prompts: prompts/README.md
  - Reference:
    - Cheat Sheets: cheat-sheets/README.md
    - Glossary: meta/glossary.md
    - Master Index: meta/indexes/MASTER-INDEX.md
    - Knowledge: knowledge/README.md
    - Domains Overview: domains/README.md
    - Docs Site Guide: docs-site.md

not_in_nav: |
  meta/templates/**
  meta/indexes/topics/**
  meta/indexes/technologies/**
  meta/indexes/patterns/**
  meta/indexes/comparisons/**
  meta/architecture-overview.md
  meta/style-guide.md
  meta/naming-conventions.md
  meta/indexing-strategy.md
  meta/mermaid-conventions.md
  domains/embeddings/**
  domains/vector-databases/**
  domains/a2a/**
  domains/ai-workflows/**
  domains/multi-agent-systems/**
  domains/cloud-deployment/**
  domains/model-serving/**
  domains/career-notes/**
  domains/research-notes/**
  resources/**